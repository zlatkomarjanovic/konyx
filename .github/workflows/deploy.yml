name: Deploy to Vercel

on:
  push:
    branches:
      - master
      - main

env:
  VERCEL_ORG_ID: team_FOHBoHSLl1WuH0ejOTrB5vfq
  VERCEL_PROJECT_ID: prj_7rYTJ3hIn3ibgWoTybuwuuvlKON6

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Sync Vercel production environment variables
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: |
          sync_env() {
            printf "%s" "$2" | vercel env add "$1" production --force --token=${{ secrets.VERCEL_TOKEN }}
          }
          sync_env AIRTABLE_API_KEY "${{ secrets.AIRTABLE_API_KEY }}"
          sync_env AIRTABLE_BASE_ID "${{ secrets.AIRTABLE_BASE_ID }}"
          sync_env AIRTABLE_TABLE_NAME "${{ secrets.AIRTABLE_TABLE_NAME }}"
          sync_env REVALIDATE_SECRET "${{ secrets.REVALIDATE_SECRET }}"

      - name: Pull Vercel environment
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: ${{ secrets.AIRTABLE_TABLE_NAME }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
