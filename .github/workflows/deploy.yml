name: Deploy to Vercel

on:
  push:
    branches:
      - master
      - main

env:
  VERCEL_ORG_ID: team_FOHBoHSLl1WuH0ejOTrB5vfq
  VERCEL_PROJECT_ID: prj_7rYTJ3hIn3ibgWoTybuwuuvlKON6

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Sync Vercel production environment variables
        run: |
          sync_env() {
            printf "%s" "$2" | vercel env add "$1" production --force --token=${{ secrets.VERCEL_TOKEN }}
          }
          sync_env NEXT_PUBLIC_SANITY_PROJECT_ID "${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}"
          sync_env NEXT_PUBLIC_SANITY_DATASET "${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}"
          sync_env NEXT_PUBLIC_SANITY_API_VERSION "${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}"
          sync_env SANITY_REVALIDATE_SECRET "${{ secrets.SANITY_REVALIDATE_SECRET }}"
          sync_env REVALIDATE_SECRET "${{ secrets.REVALIDATE_SECRET }}"

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}
          SANITY_REVALIDATE_SECRET: ${{ secrets.SANITY_REVALIDATE_SECRET }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
